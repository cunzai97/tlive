name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.11.0)'
        required: false

permissions:
  contents: write

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            echo "::error::No tag specified"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.get-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install, test, and build
        run: |
          npm install
          npm run check
          npm run build

      - name: Create release tarball
        run: |
          TAG="${{ needs.get-tag.outputs.tag }}"
          TARBALL="tlive-${TAG}.tar.gz"
          FILES=(
            package.json
            package-lock.json
            dist/
            scripts/cli.js
            scripts/postinstall.js
            scripts/preuninstall.js
            config.env.example
            install.sh
            install.ps1
          )

          for optional in \
            .claude/skills/tlive; do
            if [[ -e "$optional" ]]; then
              FILES+=("$optional")
            fi
          done

          tar czf "$TARBALL" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='src' \
            --exclude='esbuild.config.js' \
            --exclude='tsconfig.json' \
            --exclude='biome.json' \
            "${FILES[@]}"

          echo "TARBALL=$TARBALL" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.get-tag.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release view "${{ env.TAG }}" --repo ${{ github.repository }} 2>/dev/null \
            || gh release create "${{ env.TAG }}" \
                 --repo ${{ github.repository }} \
                 --title "${{ env.TAG }}" \
                 --generate-notes \
                 $PRERELEASE_FLAG

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          prerelease: ${{ needs.get-tag.outputs.prerelease == 'true' }}
          files: ${{ env.TARBALL }}
